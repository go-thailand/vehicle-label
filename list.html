<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Label System — Browse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#EFF6FF', 100:'#DBEAFE', 200:'#BFDBFE', 500:'#3B82F6', 600:'#2563EB', 700:'#1D4ED8', 800:'#1E40AF', 900:'#1E3A8A' },
                        amber: { 50:'#FFFBEB', 100:'#FEF3C7', 400:'#FBBF24', 500:'#F59E0B', 600:'#D97706' },
                    },
                    fontFamily: { sans: ['Fira Sans', 'Noto Sans Thai', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Sans', 'Noto Sans Thai', sans-serif; }
        .image-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .image-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.15); }
        .filter-chip { transition: all 0.15s ease; }
        .filter-chip:hover { background-color: #DBEAFE; }
        .filter-chip.active { background-color: #1E40AF; color: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-brand-700 rounded-lg flex items-center justify-center">
                        <i data-lucide="scan-line" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-lg font-semibold text-slate-900">Vehicle Label System</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 cursor-pointer transition-colors">Dashboard</a>
                    <a href="list.html" class="text-sm font-medium text-brand-700 border-b-2 border-brand-700 pb-0.5">Browse</a>
                    <a href="label.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 cursor-pointer transition-colors">Label</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

        <!-- Batch Header -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-slate-400 hover:text-slate-600 cursor-pointer transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <h1 class="text-lg font-semibold text-slate-900" id="batchTitle">Batch 001</h1>
                <span class="text-sm text-slate-400" id="batchInfo">500 images · cam 602</span>
            </div>
            <a href="label.html?batch=batch-001&start=0" class="inline-flex items-center gap-2 bg-brand-700 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-brand-800 cursor-pointer transition-colors">
                <i data-lucide="play" class="w-4 h-4"></i>
                Start Labeling
            </a>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap items-center gap-2 mb-4">
            <span class="text-xs font-medium text-slate-500 uppercase tracking-wide mr-1">Filter:</span>
            <button class="filter-chip active text-xs px-3 py-1.5 rounded-full border border-slate-200 cursor-pointer font-medium" data-filter="all">
                All <span class="ml-1 opacity-70">500</span>
            </button>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-filter="unlabeled">
                <span class="inline-block w-2 h-2 rounded-full bg-slate-300 mr-1"></span>Unlabeled <span class="ml-1 opacity-70">380</span>
            </button>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-filter="labeled">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 mr-1"></span>Labeled <span class="ml-1 opacity-70">110</span>
            </button>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-filter="flagged">
                <span class="inline-block w-2 h-2 rounded-full bg-red-400 mr-1"></span>Flagged <span class="ml-1 opacity-70">10</span>
            </button>
            <div class="w-px h-5 bg-slate-200 mx-1"></div>
            <span class="text-xs font-medium text-slate-500 uppercase tracking-wide mr-1">Type:</span>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-type="pickup">Pickup</button>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-type="car">Car</button>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-type="motorcycle">Motorcycle</button>
            <button class="filter-chip text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 cursor-pointer font-medium" data-type="truck">Truck</button>
        </div>

        <!-- Image Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3" id="imageGrid">
            <!-- Rendered by JS -->
        </div>

        <!-- Pagination -->
        <div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-200">
            <span class="text-sm text-slate-500">Showing 1-60 of 500</span>
            <div class="flex items-center gap-1">
                <button class="px-3 py-1.5 text-sm rounded-lg border border-slate-200 text-slate-400 cursor-not-allowed">Prev</button>
                <button class="px-3 py-1.5 text-sm rounded-lg bg-brand-700 text-white font-medium cursor-pointer">1</button>
                <button class="px-3 py-1.5 text-sm rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 cursor-pointer">2</button>
                <button class="px-3 py-1.5 text-sm rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 cursor-pointer">3</button>
                <span class="px-2 text-slate-400">...</span>
                <button class="px-3 py-1.5 text-sm rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 cursor-pointer">9</button>
                <button class="px-3 py-1.5 text-sm rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 cursor-pointer">Next</button>
            </div>
        </div>

    </main>

    <!-- Quick Preview Modal -->
    <div id="previewModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closePreview()"></div>
        <div class="absolute inset-4 md:inset-12 lg:inset-20 bg-white rounded-2xl overflow-hidden flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-semibold text-slate-900" id="previewTitle">track-351.jpg</span>
                    <span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500" id="previewMeta">cam 602 · seg 6714785</span>
                </div>
                <div class="flex items-center gap-2">
                    <a id="previewLabelBtn" href="#" class="inline-flex items-center gap-1.5 bg-brand-700 text-white text-xs font-medium px-3 py-1.5 rounded-lg hover:bg-brand-800 cursor-pointer transition-colors">
                        <i data-lucide="tag" class="w-3.5 h-3.5"></i>Label this
                    </a>
                    <button onclick="closePreview()" class="p-1.5 hover:bg-slate-100 rounded-lg cursor-pointer transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 flex items-center justify-center bg-slate-950 p-4">
                <img id="previewImage" src="" alt="Vehicle preview" class="max-w-full max-h-full object-contain rounded">
            </div>
            <div class="p-4 border-t border-slate-100 flex items-center justify-between">
                <div class="flex items-center gap-4" id="previewLabels">
                    <span class="text-xs text-slate-400">No labels yet</span>
                </div>
                <div class="flex items-center gap-2 text-xs text-slate-400">
                    <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-mono">←</kbd>
                    <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-mono">→</kbd>
                    to navigate
                    <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-mono">Esc</kbd>
                    to close
                </div>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const CONFIG = {
        S3_BASE: 'https://vehicle-reid-dataset.s3.ap-southeast-1.amazonaws.com',
        IMAGES_PER_PAGE: 60,
    };

    // ============================================================
    // MOCK DATA — Win: replace with API
    // ============================================================
    const STATUSES = ['unlabeled', 'unlabeled', 'unlabeled', 'labeled', 'labeled', 'flagged'];
    const TYPES = ['pickup', 'car', 'motorcycle', 'truck', 'van', null];
    const COLORS_DISPLAY = { white:'#F1F5F9', black:'#1E293B', silver:'#94A3B8', blue:'#3B82F6', red:'#EF4444', green:'#22C55E' };
    const COLOR_NAMES = Object.keys(COLORS_DISPLAY);

    const MOCK_IMAGES = Array.from({ length: 60 }, (_, i) => {
        const status = STATUSES[Math.floor(Math.random() * STATUSES.length)];
        const hasLabel = status === 'labeled';
        return {
            id: `track-${1000 + i}`,
            filename: `track-${1000 + i}.jpg`,
            segment_id: 6714785 + Math.floor(i / 10),
            camera_index: [602, 603, 622, 623, 542][i % 5],
            // Win: replace with actual S3 URL
            thumbnail: `https://placehold.co/200x150/1e293b/94a3b8?text=track-${1000+i}`,
            status: status,
            vehicle_type: hasLabel ? TYPES[Math.floor(Math.random() * (TYPES.length - 1))] : null,
            dominant_color: hasLabel ? COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)] : null,
            confidence: hasLabel ? (0.6 + Math.random() * 0.35).toFixed(2) : null,
        };
    });

    // ============================================================
    // RENDER
    // ============================================================

    function renderGrid() {
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = MOCK_IMAGES.map((img, idx) => {
            const statusDot = img.status === 'labeled' ? 'bg-emerald-400' :
                              img.status === 'flagged' ? 'bg-red-400' : 'bg-slate-300';
            const typeLabel = img.vehicle_type || '—';
            const colorDot = img.dominant_color ? `<div class="w-2.5 h-2.5 rounded-full shrink-0 ${img.dominant_color === 'white' ? 'border border-slate-300' : ''}" style="background:${COLORS_DISPLAY[img.dominant_color] || '#D4D4D8'}"></div>` : '';

            return `
                <div class="image-card bg-white rounded-xl border border-slate-200 overflow-hidden cursor-pointer group" onclick="openPreview(${idx})">
                    <div class="aspect-[4/3] bg-slate-100 relative overflow-hidden">
                        <img src="${img.thumbnail}" alt="${img.filename}" class="w-full h-full object-cover" loading="lazy">
                        <div class="absolute top-2 left-2 flex items-center gap-1">
                            <div class="w-2 h-2 rounded-full ${statusDot}"></div>
                        </div>
                        ${img.status === 'flagged' ? '<div class="absolute top-2 right-2"><i data-lucide="flag" class="w-3.5 h-3.5 text-red-500"></i></div>' : ''}
                        <div class="absolute inset-0 bg-brand-700/0 group-hover:bg-brand-700/10 transition-colors flex items-center justify-center">
                            <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="bg-white/90 backdrop-blur rounded-lg px-3 py-1.5 text-xs font-medium text-brand-700">Preview</div>
                            </div>
                        </div>
                    </div>
                    <div class="p-2">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-medium text-slate-700 truncate">${img.filename}</span>
                            ${colorDot}
                        </div>
                        <div class="flex items-center justify-between mt-0.5">
                            <span class="text-[10px] text-slate-400">cam ${img.camera_index}</span>
                            <span class="text-[10px] text-slate-400">${typeLabel}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        lucide.createIcons();
    }

    // ============================================================
    // PREVIEW MODAL
    // ============================================================

    let currentPreviewIdx = 0;

    function openPreview(idx) {
        currentPreviewIdx = idx;
        const img = MOCK_IMAGES[idx];
        document.getElementById('previewTitle').textContent = img.filename;
        document.getElementById('previewMeta').textContent = `cam ${img.camera_index} · seg ${img.segment_id}`;
        document.getElementById('previewImage').src = img.thumbnail.replace('200x150', '800x600');
        document.getElementById('previewLabelBtn').href = `label.html?id=${img.id}`;

        const labelsEl = document.getElementById('previewLabels');
        if (img.vehicle_type) {
            labelsEl.innerHTML = `
                <span class="text-xs px-2 py-0.5 rounded-full bg-brand-50 text-brand-700 font-medium">${img.vehicle_type}</span>
                ${img.dominant_color ? `<span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 font-medium flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:${COLORS_DISPLAY[img.dominant_color]}"></span>${img.dominant_color}</span>` : ''}
                ${img.confidence ? `<span class="text-xs text-slate-400">${(img.confidence * 100).toFixed(0)}% conf</span>` : ''}
            `;
        } else {
            labelsEl.innerHTML = '<span class="text-xs text-slate-400">No labels yet</span>';
        }

        document.getElementById('previewModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closePreview() {
        document.getElementById('previewModal').classList.add('hidden');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('previewModal');
        if (modal.classList.contains('hidden')) return;

        if (e.key === 'Escape') closePreview();
        if (e.key === 'ArrowRight' && currentPreviewIdx < MOCK_IMAGES.length - 1) openPreview(currentPreviewIdx + 1);
        if (e.key === 'ArrowLeft' && currentPreviewIdx > 0) openPreview(currentPreviewIdx - 1);
    });

    // ============================================================
    // FILTER CHIPS
    // ============================================================
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            chip.parentElement.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            // Win: implement actual filtering
        });
    });

    // Init
    renderGrid();
    lucide.createIcons();
    </script>
</body>
</html>
