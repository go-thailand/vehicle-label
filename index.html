<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Label System — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#EFF6FF', 100:'#DBEAFE', 200:'#BFDBFE', 500:'#3B82F6', 600:'#2563EB', 700:'#1D4ED8', 800:'#1E40AF', 900:'#1E3A8A' },
                        amber: { 50:'#FFFBEB', 100:'#FEF3C7', 400:'#FBBF24', 500:'#F59E0B', 600:'#D97706' },
                    },
                    fontFamily: { sans: ['Fira Sans', 'Noto Sans Thai', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Sans', 'Noto Sans Thai', sans-serif; }
        .stat-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1); }
        .batch-row { transition: background-color 0.15s ease; }
        .batch-row:hover { background-color: #F1F5F9; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-brand-700 rounded-lg flex items-center justify-center">
                        <i data-lucide="scan-line" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-lg font-semibold text-slate-900">Vehicle Label System</span>
                    <span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">v1.0</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-sm font-medium text-brand-700 border-b-2 border-brand-700 pb-0.5">Dashboard</a>
                    <a href="list.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 cursor-pointer transition-colors">Browse</a>
                    <a href="label.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 cursor-pointer transition-colors">Label</a>
                    <div class="w-px h-5 bg-slate-200"></div>
                    <div class="flex items-center gap-2 text-sm text-slate-600">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        <span id="currentUser">—</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

        <!-- Stats Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="stat-card bg-white rounded-xl border border-slate-200 p-4 cursor-default">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Total Images</span>
                    <div class="w-8 h-8 bg-brand-50 rounded-lg flex items-center justify-center">
                        <i data-lucide="image" class="w-4 h-4 text-brand-600"></i>
                    </div>
                </div>
                <div class="text-2xl font-bold text-slate-900" id="statTotal">12,848</div>
                <div class="text-xs text-slate-400 mt-1">from 5 cameras</div>
            </div>

            <div class="stat-card bg-white rounded-xl border border-slate-200 p-4 cursor-default">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Labeled</span>
                    <div class="w-8 h-8 bg-emerald-50 rounded-lg flex items-center justify-center">
                        <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i>
                    </div>
                </div>
                <div class="text-2xl font-bold text-emerald-600" id="statLabeled">0</div>
                <div class="text-xs text-slate-400 mt-1">0% complete</div>
            </div>

            <div class="stat-card bg-white rounded-xl border border-slate-200 p-4 cursor-default">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Remaining</span>
                    <div class="w-8 h-8 bg-amber-50 rounded-lg flex items-center justify-center">
                        <i data-lucide="clock" class="w-4 h-4 text-amber-600"></i>
                    </div>
                </div>
                <div class="text-2xl font-bold text-amber-600" id="statRemaining">12,848</div>
                <div class="text-xs text-slate-400 mt-1">est. ~42h at 5s/image</div>
            </div>

            <div class="stat-card bg-white rounded-xl border border-slate-200 p-4 cursor-default">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Flagged</span>
                    <div class="w-8 h-8 bg-red-50 rounded-lg flex items-center justify-center">
                        <i data-lucide="flag" class="w-4 h-4 text-red-500"></i>
                    </div>
                </div>
                <div class="text-2xl font-bold text-red-500" id="statFlagged">0</div>
                <div class="text-xs text-slate-400 mt-1">needs review</div>
            </div>
        </div>

        <!-- Two columns: Batches + Distribution -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Batch List (2/3) -->
            <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200">
                <div class="flex items-center justify-between p-4 border-b border-slate-100">
                    <h2 class="text-sm font-semibold text-slate-900 flex items-center gap-2">
                        <i data-lucide="layers" class="w-4 h-4 text-brand-600"></i>
                        Batches
                    </h2>
                    <span class="text-xs text-slate-400" id="batchCount">26 batches</span>
                </div>
                <div class="divide-y divide-slate-50" id="batchList">
                    <!-- Batch rows rendered by JS -->
                </div>
            </div>

            <!-- Label Distribution (1/3) -->
            <div class="space-y-4">
                <!-- Type Distribution -->
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                    <h3 class="text-sm font-semibold text-slate-900 mb-3 flex items-center gap-2">
                        <i data-lucide="car" class="w-4 h-4 text-brand-600"></i>
                        Type Distribution
                    </h3>
                    <div class="space-y-2" id="typeDistribution">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Color Distribution -->
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                    <h3 class="text-sm font-semibold text-slate-900 mb-3 flex items-center gap-2">
                        <i data-lucide="palette" class="w-4 h-4 text-brand-600"></i>
                        Color Distribution
                    </h3>
                    <div class="space-y-2" id="colorDistribution">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Top Labelers -->
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                    <h3 class="text-sm font-semibold text-slate-900 mb-3 flex items-center gap-2">
                        <i data-lucide="trophy" class="w-4 h-4 text-amber-500"></i>
                        Top Labelers (Today)
                    </h3>
                    <div class="space-y-3" id="leaderboard">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
    // ============================================================
    // CONFIG — Win: เปลี่ยน API endpoints ตรงนี้
    // ============================================================
    const CONFIG = {
        API_BASE: '/vehicle-label/api',           // Backend API base
        S3_BASE: 'https://vehicle-reid-dataset.s3.ap-southeast-1.amazonaws.com',
        BATCH_SIZE: 500,                            // images per batch
        TOTAL_IMAGES: 12848,
    };

    // ============================================================
    // MOCK DATA — Win: replace with API calls
    // ============================================================
    const MOCK_BATCHES = Array.from({ length: 26 }, (_, i) => ({
        id: `batch-${String(i + 1).padStart(3, '0')}`,
        name: `Batch ${i + 1}`,
        total: i < 25 ? 500 : 348,
        labeled: i < 2 ? Math.floor(Math.random() * 500) : 0,
        flagged: i < 2 ? Math.floor(Math.random() * 10) : 0,
        camera: [602, 603, 622, 623, 542][i % 5],
    }));

    const MOCK_TYPE_DIST = [
        { label: 'Pickup', count: 4200, color: '#3B82F6' },
        { label: 'Car (Sedan)', count: 3100, color: '#2563EB' },
        { label: 'Motorcycle', count: 2800, color: '#1D4ED8' },
        { label: 'Truck', count: 1500, color: '#1E40AF' },
        { label: 'Van', count: 900, color: '#6366F1' },
        { label: 'Bus', count: 348, color: '#8B5CF6' },
    ];

    const MOCK_COLOR_DIST = [
        { label: 'White', count: 4500, hex: '#F8FAFC', border: true },
        { label: 'Black', count: 2100, hex: '#1E293B' },
        { label: 'Silver', count: 1800, hex: '#94A3B8' },
        { label: 'Blue', count: 1600, hex: '#3B82F6' },
        { label: 'Red', count: 1200, hex: '#EF4444' },
        { label: 'Green', count: 800, hex: '#22C55E' },
        { label: 'Other', count: 848, hex: '#D4D4D8' },
    ];

    const MOCK_LABELERS = [
        { name: 'Best', count: 342 },
        { name: 'S', count: 287 },
        { name: 'Jame', count: 215 },
    ];

    // ============================================================
    // RENDER
    // ============================================================

    function renderBatches() {
        const container = document.getElementById('batchList');
        container.innerHTML = MOCK_BATCHES.map(b => {
            const pct = b.total > 0 ? Math.round((b.labeled / b.total) * 100) : 0;
            const statusColor = pct === 100 ? 'bg-emerald-500' : pct > 0 ? 'bg-amber-400' : 'bg-slate-200';
            const statusText = pct === 100 ? 'Done' : pct > 0 ? 'In Progress' : 'Not Started';
            const statusTextColor = pct === 100 ? 'text-emerald-700 bg-emerald-50' : pct > 0 ? 'text-amber-700 bg-amber-50' : 'text-slate-500 bg-slate-100';

            return `
                <a href="list.html?batch=${b.id}" class="batch-row flex items-center gap-4 px-4 py-3 cursor-pointer">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm font-medium text-slate-900">${b.name}</span>
                            <span class="text-xs px-1.5 py-0.5 rounded ${statusTextColor} font-medium">${statusText}</span>
                            <span class="text-xs text-slate-400">cam ${b.camera}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full ${statusColor} rounded-full transition-all" style="width:${pct}%"></div>
                            </div>
                            <span class="text-xs text-slate-500 tabular-nums w-16 text-right">${b.labeled}/${b.total}</span>
                        </div>
                    </div>
                    ${b.flagged > 0 ? `<span class="text-xs text-red-500 flex items-center gap-1"><i data-lucide="flag" class="w-3 h-3"></i>${b.flagged}</span>` : ''}
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                </a>
            `;
        }).join('');
        lucide.createIcons();
    }

    function renderDistribution(containerId, data, maxVal) {
        const max = maxVal || Math.max(...data.map(d => d.count));
        const container = document.getElementById(containerId);
        container.innerHTML = data.map(d => {
            const pct = Math.round((d.count / max) * 100);
            const borderClass = d.border ? 'border border-slate-200' : '';
            return `
                <div class="flex items-center gap-2">
                    ${d.hex ? `<div class="w-3 h-3 rounded-full shrink-0 ${borderClass}" style="background:${d.hex}"></div>` : ''}
                    <span class="text-xs text-slate-600 w-20 truncate">${d.label}</span>
                    <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full rounded-full" style="width:${pct}%;background:${d.color || d.hex || '#3B82F6'}"></div>
                    </div>
                    <span class="text-xs text-slate-500 tabular-nums w-10 text-right">${d.count.toLocaleString()}</span>
                </div>
            `;
        }).join('');
    }

    function renderLeaderboard() {
        const container = document.getElementById('leaderboard');
        container.innerHTML = MOCK_LABELERS.map((l, i) => {
            const medals = ['🥇', '🥈', '🥉'];
            return `
                <div class="flex items-center gap-3">
                    <span class="text-sm w-5 text-center">${medals[i] || (i+1)}</span>
                    <span class="text-sm font-medium text-slate-700 flex-1">${l.name}</span>
                    <span class="text-sm font-semibold text-brand-700 tabular-nums">${l.count}</span>
                    <span class="text-xs text-slate-400">images</span>
                </div>
            `;
        }).join('');
    }

    // Init
    renderBatches();
    renderDistribution('typeDistribution', MOCK_TYPE_DIST);
    renderDistribution('colorDistribution', MOCK_COLOR_DIST);
    renderLeaderboard();
    lucide.createIcons();
    </script>
</body>
</html>
